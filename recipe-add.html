<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecipeBox | Add Recipe</title>
  </head>
  <body data-page="recipe-add" data-authenticated="true" data-role="normal" data-recipe-form-mode="add">
    <div data-navbar-root></div>
    <main class="page-shell">
      <div class="container">
        <section class="page-panel">
          <p class="soft-label mb-2">Add Recipe</p>
          <h1 class="h3 mb-4" data-recipe-form-title>Create a recipe</h1>
          <p class="text-secondary mb-4" data-form-status>Ready to create a recipe</p>

          <form class="d-grid gap-3">
            <div>
              <label class="form-label" for="recipe-title">Title</label>
              <input id="recipe-title" name="title" class="form-control" type="text" required />
            </div>
            <div>
              <label class="form-label" for="recipe-description">Description</label>
              <textarea id="recipe-description" name="description" class="form-control" rows="3" required></textarea>
            </div>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label" for="recipe-category">Category</label>
                <select id="recipe-category" name="categoryId" class="form-select" required>
                  <option value="">Select a category</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="recipe-image">Image URL</label>
                <input id="recipe-image" name="imageUrl" class="form-control" type="url" placeholder="https://..." />
              </div>
            </div>
            <div>
              <label class="form-label" for="recipe-ingredients">Ingredients</label>
              <textarea id="recipe-ingredients" name="ingredients" class="form-control" rows="6" required></textarea>
            </div>
            <div>
              <label class="form-label" for="recipe-steps">Steps</label>
              <textarea id="recipe-steps" name="steps" class="form-control" rows="8" required></textarea>
            </div>
            <div class="d-flex gap-2 flex-wrap">
              <button class="btn btn-primary btn-lg" type="submit">Create Recipe</button>
              <a class="btn btn-outline-secondary btn-lg" href="/my-recipes/">Cancel</a>
            </div>
          </form>
        </section>
      </div>
    </main>
    <div data-footer-root></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
