<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecipeBox | Recipes</title>
  </head>
  <body data-page="recipes" data-authenticated="false" data-role="normal">
    <div data-navbar-root></div>
    <main class="page-shell">
      <div class="container">
        <section class="page-hero mb-4">
          <div class="row align-items-end g-3">
            <div class="col-lg-8">
              <p class="soft-label mb-2">Recipes</p>
              <h1 class="display-6 fw-bold mb-3">Browse public recipes from the RecipeBox community.</h1>
              <p class="lead text-secondary mb-0">Open any card to see the full recipe and ingredients.</p>
            </div>
          </div>
        </section>

        <section class="page-panel">
          <div class="row g-4 mb-4">
            <div class="col-md-5">
              <label class="form-label" for="recipes-search">Search recipes</label>
              <input id="recipes-search" class="form-control form-control-lg" type="search" placeholder="Search by title..." data-recipes-search />
            </div>
            <div class="col-md-4">
              <label class="form-label" for="recipes-category">Category filter</label>
              <select id="recipes-category" class="form-select form-select-lg" data-recipes-category>
                <option value="all">All categories</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label" for="recipes-tag">Tag filter</label>
              <select id="recipes-tag" class="form-select form-select-lg" data-recipes-tag>
                <option value="all">All tags</option>
              </select>
            </div>
          </div>

          <div class="row g-4 d-none" data-recipes-loading>
            <div class="col-12">
              <div class="text-center py-5">
                <div class="spinner-border text-primary mb-3" role="status" aria-hidden="true"></div>
                <div class="fw-semibold">Loading recipes...</div>
              </div>
            </div>
          </div>

          <div class="row g-4 d-none" data-recipes-empty>
            <div class="col-12">
              <div class="text-center py-5">
                <i class="bi bi-search display-6 text-secondary mb-3" aria-hidden="true"></i>
                <h2 class="h4 mb-2">No recipes yet</h2>
                <p class="text-secondary mb-0" data-empty-message>No recipes yet.</p>
              </div>
            </div>
          </div>

          <div class="row g-4 d-none" data-recipes-grid></div>
        </section>
      </div>
    </main>
    <div data-footer-root></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
