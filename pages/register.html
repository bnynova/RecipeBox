<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecipeBox | Register</title>
  </head>
  <body data-page="register" data-authenticated="false" data-role="normal">
    <div data-navbar-root></div>
    <main class="page-shell">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-6">
            <section class="page-panel">
              <p class="soft-label mb-2">Create account</p>
              <h1 class="h3 mb-4">Register for RecipeBox</h1>
              <form class="d-grid gap-3">
                <div>
                  <label class="form-label" for="register-name">Display name</label>
                  <input id="register-name" class="form-control" type="text" placeholder="Jane Doe" />
                </div>
                <div>
                  <label class="form-label" for="register-email">Email</label>
                  <input id="register-email" class="form-control" type="email" placeholder="jane@example.com" />
                </div>
                <div>
                  <label class="form-label" for="register-password">Password</label>
                  <input id="register-password" class="form-control" type="password" placeholder="Create a password" />
                </div>
                <button class="btn btn-primary" type="submit">Register</button>
              </form>
            </section>
          </div>
        </div>
      </div>
    </main>
    <div data-footer-root></div>
    <script type="module" src="../src/main.js"></script>
  </body>
</html>
