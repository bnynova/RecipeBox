<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecipeBox | Recipe Details</title>
  </head>
  <body data-page="recipe-details" data-authenticated="false" data-role="normal">
    <div data-navbar-root></div>
    <main class="page-shell">
      <div class="container">
        <section class="page-panel mb-4">
          <div class="row g-4 align-items-center">
            <div class="col-lg-6">
              <div data-recipe-image-slot class="recipe-details__image-wrap rounded-4 overflow-hidden">
                <div class="recipe-card__placeholder recipe-details__placeholder rounded-4 d-none" data-recipe-image-placeholder></div>
                <img data-recipe-image class="recipe-details__image d-none" alt="Recipe image" />
              </div>
            </div>
            <div class="col-lg-6">
              <p class="soft-label mb-2">Recipe details</p>
              <h1 class="h2" data-recipe-title>Loading recipe...</h1>
              <p class="text-secondary" data-recipe-description>Fetching recipe details from Supabase.</p>
              <dl class="row mb-0">
                <dt class="col-sm-4">Category</dt>
                <dd class="col-sm-8" data-recipe-category>—</dd>
                <dt class="col-sm-4">Author</dt>
                <dd class="col-sm-8" data-recipe-author>—</dd>
                <dt class="col-sm-4">Recipe ID</dt>
                <dd class="col-sm-8" data-recipe-id>—</dd>
              </dl>
            </div>
          </div>
        </section>

        <section class="page-panel">
          <div class="row g-4">
            <div class="col-lg-5">
              <h2 class="h4">Ingredients</h2>
              <ul class="list-unstyled mb-0" data-recipe-ingredients></ul>
            </div>
            <div class="col-lg-7">
              <h2 class="h4">Steps</h2>
              <div class="d-grid gap-3" data-recipe-steps></div>
            </div>
          </div>
        </section>
      </div>
    </main>
    <div data-footer-root></div>
    <script type="module" src="../src/main.js"></script>
  </body>
</html>
