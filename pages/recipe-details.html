<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecipeBox | Recipe Details</title>
  </head>
  <body data-page="recipe-details" data-authenticated="false" data-role="normal">
    <div data-navbar-root></div>
    <main class="page-shell">
      <div class="container">
        <section class="page-panel mb-4">
          <div class="row g-4 align-items-center">
            <div class="col-lg-6">
              <div class="recipe-card__placeholder rounded-4"></div>
            </div>
            <div class="col-lg-6">
              <p class="soft-label mb-2">Recipe details</p>
              <h1 class="h2">Lemon Herb Chicken</h1>
              <p class="text-secondary">This page is ready for recipe content, author details, and actions.</p>
              <dl class="row mb-0">
                <dt class="col-sm-4">Category</dt>
                <dd class="col-sm-8">Dinner</dd>
                <dt class="col-sm-4">Author</dt>
                <dd class="col-sm-8">RecipeBox user</dd>
                <dt class="col-sm-4">Prep time</dt>
                <dd class="col-sm-8">30 minutes</dd>
              </dl>
            </div>
          </div>
        </section>

        <section class="page-panel">
          <h2 class="h4">Ingredients and steps</h2>
          <p class="text-secondary mb-0">Supabase data bindings can be added here later without changing the page shell.</p>
        </section>
      </div>
    </main>
    <div data-footer-root></div>
    <script type="module" src="../src/main.js"></script>
  </body>
</html>
