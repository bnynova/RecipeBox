[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/pages/admin.html"
  status = 200

[[redirects]]
  from = "/recipes"
  to = "/recipes.html"
  status = 200

[[redirects]]
  from = "/contacts"
  to = "/contacts.html"
  status = 200

[[redirects]]
  from = "/profile"
  to = "/profile.html"
  status = 200

[[redirects]]
  from = "/my-recipes"
  to = "/my-recipes/index.html"
  status = 200

[[redirects]]
  from = "/recipe/add"
  to = "/recipe-add.html"
  status = 200

[[redirects]]
  from = "/recipe/:id/edit"
  to = "/recipe-edit.html?id=:id"
  status = 200

[[redirects]]
  from = "/recipe/:id/edit/"
  to = "/recipe-edit.html?id=:id"
  status = 200
