<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecipeBox | Profile</title>
  </head>
  <body data-page="profile" data-authenticated="false" data-role="normal">
    <div data-navbar-root></div>
    <main class="page-shell">
      <div class="container">
        <section class="page-hero mb-4">
          <div class="row align-items-end g-3">
            <div class="col-lg-8">
              <p class="soft-label mb-2">Profile</p>
              <h1 class="display-6 fw-bold mb-3">Manage your account details.</h1>
              <p class="lead text-secondary mb-0">Update your display name, bio, and profile picture.</p>
            </div>
          </div>
        </section>

        <div class="row g-4">
          <div class="col-lg-4">
            <section class="page-panel h-100 text-center d-flex flex-column align-items-center justify-content-center">
              <div class="rounded-circle overflow-hidden d-flex align-items-center justify-content-center bg-secondary-subtle mb-3" style="width: 9.5rem; height: 9.5rem;">
                <img class="w-100 h-100 object-fit-cover d-none" data-profile-avatar-image alt="Profile avatar preview" />
                <span class="h1 fw-bold mb-0 text-secondary" data-profile-avatar-placeholder>?</span>
              </div>
              <h2 class="h4 mb-1" data-profile-page-name>Your profile</h2>
              <p class="text-secondary mb-3" data-profile-email></p>
              <label class="btn btn-outline-primary" for="profile-avatar">Upload photo</label>
              <input id="profile-avatar" class="d-none" type="file" accept="image/*" data-profile-avatar-input />
              <p class="form-text mt-2 mb-0">JPG, PNG, or WebP up to 5 MB.</p>
            </section>
          </div>

          <div class="col-lg-8">
            <section class="page-panel">
              <p class="soft-label mb-2">Account settings</p>
              <h2 class="h4 mb-3">Profile details</h2>
              <p class="text-secondary mb-3" data-profile-status>Loading profile...</p>
              <div class="alert d-none" role="alert" data-profile-feedback></div>
              <form class="d-grid gap-3" novalidate>
                <div>
                  <label class="form-label" for="profile-name">Display name</label>
                  <input id="profile-name" name="displayName" class="form-control" type="text" placeholder="Jane Doe" required />
                </div>
                <div>
                  <label class="form-label" for="profile-bio">Bio</label>
                  <textarea id="profile-bio" name="bio" class="form-control" rows="5" placeholder="Tell other cooks about yourself..."></textarea>
                </div>
                <div class="d-flex gap-2 flex-wrap">
                  <button class="btn btn-primary" type="submit" data-profile-save-button>Save profile</button>
                </div>
              </form>
            </section>
          </div>
        </div>
      </div>
    </main>
    <div data-footer-root></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
