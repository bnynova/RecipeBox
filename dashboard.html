<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecipeBox | Dashboard</title>
  </head>
  <body data-page="dashboard" data-authenticated="true" data-role="normal">
    <div data-navbar-root></div>
    <main class="page-shell">
      <div class="container">
        <section class="page-hero mb-4">
          <div class="row align-items-end g-3">
            <div class="col-lg-8">
              <p class="soft-label mb-2">Dashboard</p>
              <h1 class="display-6 fw-bold mb-3">Browse recipes from the RecipeBox community.</h1>
              <p class="lead text-secondary mb-0">
                Search by title, filter by category, and open any card to view the full recipe.
              </p>
            </div>
            <div class="col-lg-4 text-lg-end">
              <a class="btn btn-primary btn-lg" href="/recipe/add" data-action="add-recipe">Add Recipe</a>
            </div>
          </div>
        </section>

        <section class="page-panel mb-4">
          <div class="row g-3 align-items-end">
            <div class="col-md-7">
              <label class="form-label" for="dashboard-search">Search recipes</label>
              <input id="dashboard-search" class="form-control form-control-lg" data-dashboard-search type="search" placeholder="Search by title..." />
            </div>
            <div class="col-md-5">
              <label class="form-label" for="dashboard-category">Category filter</label>
              <select id="dashboard-category" class="form-select form-select-lg" data-dashboard-category>
                <option value="all">All categories</option>
              </select>
            </div>
          </div>
        </section>

        <section>
          <div data-dashboard-loading class="page-panel text-center py-5">
            <div class="spinner-border text-primary mb-3" role="status" aria-hidden="true"></div>
            <div class="fw-semibold">Loading recipes...</div>
          </div>

          <div data-dashboard-empty class="page-panel text-center py-5 d-none">
            <h2 class="h4 mb-2">No recipes found</h2>
            <p class="text-secondary mb-0" data-empty-message>No recipes found</p>
          </div>

          <div class="row g-4 d-none" data-dashboard-grid></div>
        </section>
      </div>
    </main>
    <div data-footer-root></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
